[global]
type=global
user_agent=YAWA-BY-QLI-Asterisk-WebRTC

; -------------------------------
; Transports
; -------------------------------

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

; -------------------------------
; WebRTC endpoint template
; -------------------------------

[webrtc-client](!)
type=endpoint
context=internal
transport=transport-wss

disallow=all
allow=opus,ulaw,alaw

direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

ice_support=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass

use_avpf=yes
rtcp_mux=yes

webrtc=yes

timers=no
callerid_privacy=allowed_not_screened
trust_id_inbound=yes
send_pai=yes
send_rpid=yes

; -------------------------------
; Extension 1001
; -------------------------------

[1001](webrtc-client)
auth=1001-auth
aors=1001
callerid="Webphone 1001" <1001>

[1001-auth]
type=auth
auth_type=userpass
username=1001
password=StrongPass1001

[1001]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

